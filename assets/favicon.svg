<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Toast research">
  <!-- Editorial monogram: felt-dark tile, felt-green serifed bar. No casino motifs. -->
  <rect width="64" height="64" rx="14" fill="#0d0f12"/>
  <rect x="12" y="12" width="40" height="40" rx="10" fill="none" stroke="#35c07d" stroke-width="1.5" opacity="0.35"/>
  <!-- Serifed capital T set in a Didone-ish stroke to echo the display face -->
  <g fill="#35c07d">
    <rect x="18" y="20" width="28" height="5.2" rx="1.4"/>
    <rect x="29.4" y="20" width="5.2" height="26" rx="1.4"/>
    <!-- bracketed serif feet -->
    <rect x="24" y="43.2" width="16" height="3.4" rx="1.4"/>
  </g>
</svg>
